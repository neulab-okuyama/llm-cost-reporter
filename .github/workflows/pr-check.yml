name: PR quality check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - run: uv sync

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy .
